# Clean URLs: rewrite /prefix/page → actual file location

# Calgary entities (explicit, before GoA wildcard)
[[redirects]]
  from = "/enmax/service-map"
  to = "/data/ca/ab/calgary/enmax/service-map.html"
  status = 200

[[redirects]]
  from = "/enmax/legislation"
  to = "/data/ca/ab/calgary/enmax/legislation.html"
  status = 200

# GoA ministries (wildcard catch-all)
[[redirects]]
  from = "/:prefix/service-map"
  to = "/data/ca/ab/goa/:prefix/service-map.html"
  status = 200

[[redirects]]
  from = "/:prefix/legislation"
  to = "/data/ca/ab/goa/:prefix/legislation.html"
  status = 200

# ── Legacy redirects ─────────────────────────────────────────
[[redirects]]
  from = "/ab"
  to = "/goa"
  status = 301

[[redirects]]
  from = "/ab/*"
  to = "/goa/:splat"
  status = 301

[[redirects]]
  from = "/health"
  to = "/pphs/service-map"
  status = 301

[[redirects]]
  from = "/health/*"
  to = "/pphs/:splat"
  status = 301

[[redirects]]
  from = "/im"
  to = "/jeti/service-map"
  status = 301

[[redirects]]
  from = "/im/*"
  to = "/jeti/:splat"
  status = 301

# ── Service directory clean URLs ─────────────────────────────
[[redirects]]
  from = "/services"
  to = "/services/index.html"
  status = 200

[[redirects]]
  from = "/services/browse"
  to = "/services/browse.html"
  status = 200

[[redirects]]
  from = "/services/search"
  to = "/services/search.html"
  status = 200

[[redirects]]
  from = "/services/life-events"
  to = "/services/life-events.html"
  status = 200

# ── Headers ──────────────────────────────────────────────────
[[headers]]
  for = "/data/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
